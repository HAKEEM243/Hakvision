name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Cloudflare Account ID
        id: account
        run: |
          ACCOUNT_ID=$(curl -s "https://api.cloudflare.com/client/v4/accounts" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])")
          echo "id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Create Pages project if needed
        run: |
          npx wrangler pages project create hakvision --production-branch main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.id }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ steps.account.outputs.id }}
          command: pages deploy . --project-name=hakvision --commit-dirty=true
